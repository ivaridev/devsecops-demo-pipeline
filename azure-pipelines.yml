# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Instalar as dependências do projeto Juice Shop
- script: |
    npm install
  displayName: 'Install Project Dependencies'

# 2. Análise de SCA (vulnerabilidades em dependências de terceiros)
- script: |
    npm audit --audit-level=high
  displayName: 'Component Security Scan (SCA)'
  continueOnError: true

# 3. Secret Scanning (verificar se há senhas ou chaves expostas no código)
- script: |
    docker run -v $(System.DefaultWorkingDirectory):/path zricethezaza/gitleaks:latest detect --source=/path --verbose
  displayName: 'Credential Exposure Scan (Secret Scanning)'
  continueOnError: true

# 4. SAST com Semgrep
- script: |
    docker run --rm -v "$(System.DefaultWorkingDirectory):/src" returntocorp/semgrep semgrep scan --config=auto
  displayName: 'Lightweight SAST Scan (Semgrep)'
  continueOnError: true


# 5. Preparação do SonarQube Cloud (Configuração Manual)
- task: SonarCloudPrepare@3
  inputs:
    SonarCloud: 'SonarCloud-Connection'
    organization: 'ivaridev-sandbox'
    scannerMode: 'CLI'
    configMode: 'manual'
    cliProjectKey: 'devsecops-pipeline'
    cliProjectName: 'devsecops-pipeline'
    cliSources: '.'
    extraProperties: |
      sonar.organization=ivaridev-sandbox
      sonar.projectKey=devsecops-pipeline

# 6. Execução do Scan do SonarQube Cloud (Forçando o token novo)
- task: SonarCloudAnalyze@3
  displayName: 'Deep SAST & Code Quality Scan (SonarQube Cloud)'
  continueOnError: true
  env:
    SONAR_TOKEN: 'ffaeb771ebd201df028aa9184423838651475bd2' # Insert the token

# 7. Publicação dos resultados no painel do SonarQube Cloud
- task: SonarCloudPublish@3
  inputs:
    pollingTimeoutSec: '300'
  displayName: 'Publish SonarQube Cloud Quality Gate Results'